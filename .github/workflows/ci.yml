name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-fund --no-audit
      - run: npm test
      - run: npm run build
      - run: node dist/cli/index.js --help
      - name: Validate Unix installer syntax
        if: runner.os != 'Windows'
        run: bash -n install.sh
      - name: Validate Windows installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: '[scriptblock]::Create((Get-Content -Raw -Encoding utf8 install.ps1)) | Out-Null'
